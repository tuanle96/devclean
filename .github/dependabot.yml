version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, rust]
    open-pull-requests-limit: 5
    ignore:
      # rusqlite >= 0.40 pulls libsqlite3-sys >= 0.38, whose build script uses
      # cfg_select! and needs Rust 1.95 — far beyond the crate's MSRV of 1.85.
      # Revisit when the MSRV policy moves.
      - dependency-name: rusqlite
        versions: [">=0.40.0"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]
    open-pull-requests-limit: 5
